<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MGE 2026 Submission Received</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Teko:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell submit-shell">
      <section class="submit-stage reveal revealed">
        <div class="submit-orbit" aria-hidden="true">
          <div class="submit-ring submit-ring-a"></div>
          <div class="submit-ring submit-ring-b"></div>
          <div class="submit-core"></div>
        </div>
        <p class="eyebrow">MGE 2026 Fortnite Tournament</p>
        <h1 class="submit-title">Submission received</h1>
        <p class="submit-copy" id="submitCopy">We are packaging your verification files for review.</p>
        <div class="submit-steps">
          <span class="submit-step active-step">Upload complete</span>
          <span class="submit-step" id="stepReview">Queued for admin review</span>
          <span class="submit-step" id="stepDone">Ready</span>
        </div>
        <div class="submit-actions">
          <a class="button button-secondary" href="/">Return to form</a>
        </div>
      </section>
    </main>

    <script src="/submitted.js"></script>
  </body>
</html>
